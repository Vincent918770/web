<!DOCTYPE html>
<html>

<head>

    <style>
        p.one {
            background-color: lightblue;
            border: double;
            border-color: tomato;
            font-size: 50px;
            border-width: 5px;
            
        }
        p.two {
            background-color: yellow;
            border: solid;
            border-color: blue;
            font-size: 50px;
            border-width: 5px;

        }
        p.three {
            background-color: mediumseagreen;
            border: dotted;
            border-color: gray;
            font-size: 50px;
            border-width: 5px;

        }
    </style>
</head>

<body>
    <p class="one">Hello World</p>
    <p class="two">Hello World</p>
    <p class="three">Hello World</p>
</body>

</html>
