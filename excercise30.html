<!DOCTYPE html>
<html>
<body>



<h1 id="demo">Hello</h1>

<button type="button" onclick="myFunction()" onmouseover="changecolor()">Button</button>

<script>
function changecolor() {
  document.getElementById("demo").style.color = "magenta";
}
function myFunction() {
  document.getElementById("demo").innerHTML = "Mouse Click";
}
</script>

</body>
</html>
