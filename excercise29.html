<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Bootstrap Page</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        /* 稍微調整間距，讓它更接近圖示 */
        body { padding-top: 20px; }
        .container { border: 1px solid #f0f0f0; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="jumbotron">
        <h1>My First Bootstrap Page</h1>
    </div>

    <div class="form-group">
        <label for="usr">Input:</label>
        <input type="text" class="form-control" id="usr">
    </div>

    <div class="alert alert-success">
        Successful alert
    </div>

    <button type="button" class="btn btn-default">Button</button>
    <span class="badge">badge</span>
</div>

</body>
</html>
